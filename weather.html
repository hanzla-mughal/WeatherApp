<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>
    <div class="container">
        <div class="input">
            <input type="text" id="city">
        </div>


        <div class="button">
            <button onclick="getWeather()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="div">
        <h4 id="temp" class="data"></h4>
        <h4 id="Name" class="data"></h4>
        <h4 id="Desc" class="data"></h4>

        <h4 id="humidity" class="data"></h4>
        <h4 id="wind" class="data"></h4>
        <img id="icon" class="data">
    </div>
    <h2>5-day Forecast</h2>
    <div class="forecast" id="forecast">
        
    </div>
   <script src="config.js"></script>

    <script src="weather.js"></script>
</body>

</html>
